site_name: crm — D365 CE on-prem CLI
site_description: CLI + agent guide for Dynamics 365 CE on-premises customizations
site_url: https://crm-cli-docs.pages.dev/
repo_url: https://github.com/Gharib89/crm
repo_name: Gharib89/crm
docs_dir: docs
copyright: Made by Ahmed Gharib

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: Roboto Mono
  features:
    # Navigation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    # Search UX
    - search.suggest
    - search.highlight
    - search.share
    # Code UX
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Gharib89/crm
      name: crm on GitHub

plugins:
  - search
  - include-markdown
  - llmstxt:
      full_output: llms-full.txt
      markdown_description: |
        crm — a stateful CLI for Microsoft Dynamics 365 Customer Engagement.
        Targets on-prem v9.x (NTLM) or Dataverse online (OAuth client-credentials)
        over the Dataverse Web API (OData v4) / HTTPS. Covers record CRUD,
        OData/FetchXML queries, metadata browsing and write, solution lifecycle,
        declarative apply, and bulk CSV/JSON export. `--json` everywhere for agents.
      sections:
        Getting started:
          - getting-started/install.md: Install (script or from source)
          - getting-started/initialize.md: First-run setup
          - getting-started/configure.md: Auth (NTLM / OAuth) and profiles
        How-to:
          - how-to/*.md
        Reference:
          - reference/cli.md: Full command tree

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - mkdocs-click

exclude_docs: |
  index.html
  adr/
  agents/
  research/
  superpowers/

nav:
  - Home: index.md
  - Getting started:
      - Install: getting-started/install.md
      - Initialize: getting-started/initialize.md
      - Configure: getting-started/configure.md
  - Guides:
      - CRMWorx walkthrough: guides/crmworx-walkthrough.md
  - How-to:
      - profile: how-to/profile.md
      - connection: how-to/connection.md
      - entity: how-to/entity.md
      - query: how-to/query.md
      - metadata: how-to/metadata.md
      - solution: how-to/solution.md
      - data: how-to/data.md
      - action: how-to/action.md
      - view: how-to/view.md
      - apply: how-to/apply.md
      - scaffold: how-to/scaffold.md
      - describe: how-to/describe.md
      - app: how-to/app.md
      - webresource: how-to/webresource.md
      - ribbon: how-to/ribbon.md
      - form: how-to/form.md
      - plugin: how-to/plugin.md
      - security: how-to/security.md
      - async: how-to/async.md
      - session: how-to/session.md
      - skill: how-to/skill.md
      - workflow: how-to/workflow.md
      - sla: how-to/sla.md
      - translation: how-to/translation.md
  - Reference:
      - CLI: reference/cli.md
      - Changelog: changelog.md
  - Contributing:
      - Skill & CLI sync: contributing/skill-and-cli.md
