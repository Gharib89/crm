site_name: crm — D365 CE on-prem CLI
site_description: CLI + agent guide for Dynamics 365 CE on-premises customizations
site_url: https://crm-cli-docs.pages.dev/
repo_url: https://github.com/Gharib89/crm
repo_name: Gharib89/crm
docs_dir: docs
copyright: Made by Ahmed Gharib

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: Roboto Mono
  features:
    # Navigation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    # Search UX
    - search.suggest
    - search.highlight
    - search.share
    # Code UX
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Gharib89/crm
      name: crm on GitHub

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - mkdocs-click

exclude_docs: |
  index.html
  adr/
  agents/
  research/
  superpowers/

nav:
  - Home: index.md
  - Getting started:
      - Install: getting-started/install.md
      - Configure: getting-started/configure.md
  - Guides:
      - CRMWorx walkthrough: guides/crmworx-walkthrough.md
  - How-to:
      - connection: how-to/connection.md
      - entity: how-to/entity.md
      - query: how-to/query.md
      - metadata: how-to/metadata.md
      - solution: how-to/solution.md
      - data: how-to/data.md
      - action: how-to/action.md
      - view: how-to/view.md
      - app: how-to/app.md
      - async: how-to/async.md
      - session: how-to/session.md
      - skill: how-to/skill.md
      - workflow: how-to/workflow.md
  - Reference:
      - CLI: reference/cli.md
  - Contributing:
      - Skill & CLI sync: contributing/skill-and-cli.md
