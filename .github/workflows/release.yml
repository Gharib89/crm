name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-tag:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Verify tag matches setup.py version
        run: python scripts/check_tag_version.py "${GITHUB_REF_NAME}"

  build:
    needs: verify-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: crm-linux-x86_64
            binary_path: dist/crm
          - os: windows-latest
            artifact_name: crm-windows-x86_64.exe
            binary_path: dist/crm.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q

      - name: Build with PyInstaller
        run: pyinstaller crm.spec

      - name: Smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ./dist/crm --version
          ./dist/crm --help

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          .\dist\crm.exe --version
          .\dist\crm.exe --help

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.binary_path }}" "out/${{ matrix.artifact_name }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: out/${{ matrix.artifact_name }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: ls -la artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/crm-linux-x86_64
            artifacts/crm-windows-x86_64.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
