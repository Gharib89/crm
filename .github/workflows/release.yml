name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-tag:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Verify tag matches setup.py version
        run: python scripts/check_tag_version.py "${GITHUB_REF_NAME}"

  build:
    needs: verify-tag
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-22.04
            archive_name: crm-linux-x86_64.tar.gz
          - os: windows-latest
            archive_name: crm-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q

      - name: Build with PyInstaller
        run: pyinstaller crm.spec

      - name: Smoke test (Linux)
        if: runner.os != 'Windows'
        run: |
          ./dist/crm/crm --version
          ./dist/crm/crm --help

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          .\dist\crm\crm.exe --version
          .\dist\crm\crm.exe --help

      - name: Archive (Linux)
        if: runner.os != 'Windows'
        run: tar -czf "${{ matrix.archive_name }}" -C dist/crm .

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/crm/* -DestinationPath "${{ matrix.archive_name }}" -Force

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum crm-linux-x86_64.tar.gz crm-windows-x86_64.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Publish to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TAG: ${{ github.ref_name }}
        run: |
          bucket=crm-cli-releases
          for f in crm-linux-x86_64.tar.gz crm-windows-x86_64.zip; do
            case "$f" in
              *.zip) ct=application/zip ;;
              *)     ct=application/gzip ;;
            esac
            npx --yes wrangler@4.97.0 r2 object put "$bucket/${TAG}/$f" \
              --file="artifacts/$f" --content-type="$ct" --remote
            npx --yes wrangler@4.97.0 r2 object put "$bucket/latest/$f" \
              --file="artifacts/$f" --content-type="$ct" --remote
          done
          # Plain-text VERSION marker so `crm self-update` can learn the latest
          # version with one cheap GET (no GitHub API / rate limits).
          printf '%s\n' "${TAG}" > artifacts/VERSION
          for prefix in "${TAG}" latest; do
            npx --yes wrangler@4.97.0 r2 object put "$bucket/${prefix}/SHA256SUMS" \
              --file="artifacts/SHA256SUMS" --content-type="text/plain; charset=utf-8" --remote
            npx --yes wrangler@4.97.0 r2 object put "$bucket/${prefix}/VERSION" \
              --file="artifacts/VERSION" --content-type="text/plain; charset=utf-8" --remote
          done
          npx --yes wrangler@4.97.0 r2 object put "$bucket/install.ps1" \
            --file=scripts/install.ps1 --content-type="text/plain; charset=utf-8" --remote
          npx --yes wrangler@4.97.0 r2 object put "$bucket/install.sh" \
            --file=scripts/install.sh --content-type="text/plain; charset=utf-8" --remote

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/crm-linux-x86_64.tar.gz
            artifacts/crm-windows-x86_64.zip
            artifacts/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
