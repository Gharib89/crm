name: docs
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'crm/**'
      - 'setup.py'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'crm/**'
      - 'setup.py'
      - 'CHANGELOG.md'
      - '.github/workflows/docs.yml'
permissions:
  contents: read
concurrency:
  group: docs-${{ github.ref }}
  # Cancel superseded PR runs; never cancel a push:main deploy.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  # Single job: build --strict once (the gate), then deploy that same site/ on
  # push. Avoids the previous second job's redundant install + rebuild.
  docs:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: setup.py
      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build (strict)
        run: mkdocs build --strict
      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.97.0'
          command: pages deploy site --project-name=crm-cli-docs
