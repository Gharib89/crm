name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: crm-linux-x86_64
          - os: windows-latest
            artifact_name: crm-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q

      - name: Type check (pyright)
        run: pyright

      - name: Build with PyInstaller
        run: pyinstaller crm.spec

      - name: Smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ./dist/crm/crm --version
          ./dist/crm/crm --help

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          .\dist\crm\crm.exe --version
          .\dist\crm\crm.exe --help

      # PR builds gate on tests/pyright/build/smoke above; the onedir bundle is
      # only worth persisting for main. Skipping PR uploads + short retention
      # keeps Actions artifact storage from filling the quota.
      - uses: actions/upload-artifact@v7
        if: github.event_name == 'push'
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/crm
          if-no-files-found: error
          retention-days: 7
